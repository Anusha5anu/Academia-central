<!-- frontend/templates/base.html -->
<!-- This is the "base" layout that all other pages extend.
     Jinja2 template engine (built into Flask) lets us reuse this layout. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Academia Central{% endblock %}</title>

  <!-- Bootstrap 5 CSS — gives us a beautiful, responsive grid and components -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Our custom stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── Navigation Bar ─────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/">
        <i class="bi bi-mortarboard-fill me-2"></i>Academia Central
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center">
          <!-- These links are shown/hidden by JavaScript depending on login state -->
          <li class="nav-item" id="nav-login"><a class="nav-link" href="/login">Login</a></li>
          <li class="nav-item" id="nav-register"><a class="nav-link" href="/register">Register</a></li>
          <li class="nav-item d-none" id="nav-student-dash"><a class="nav-link" href="/student/dashboard">Dashboard</a></li>
          <li class="nav-item d-none" id="nav-admin-dash"><a class="nav-link" href="/admin/dashboard">Admin Panel</a></li>
          <li class="nav-item d-none" id="nav-logout">
            <a class="nav-link text-warning" href="#" onclick="logout()">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Page Content ───────────────────────────────────────────────────── -->
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Scripts ───────────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
